<!-- String matching visualizer --> 

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>String Manipulation</title>
    <link rel="stylesheet" href="css/style.css">
    
</head>
<body>

    <div class="container">
        <div class="text-section">
            <h1>String Matching Visualizer</h1>
        </div>

        <div class="input-section">
            <div class="input-group">
                <label>Text</label>
                <input type="text" id="text-input" class="hidden-input" maxlength="15" autocomplete="off">
                <div id="text-blocks" class="block-container" onclick="document.getElementById('text-input').focus()">
                    <span class="placeholder-text">Click to type text...</span>
                </div>
            </div>

            <div class="input-group">
                <label>Pattern</label>
                <input type="text" id="pattern-input" class="hidden-input" maxlength="15" autocomplete="off">
                <div id="pattern-blocks" class="block-container" onclick="document.getElementById('pattern-input').focus()">
                    <span class="placeholder-text">Click to type pattern...</span>
                </div>
            </div>
        </div>
         <a href="preprocessing.html">
            <button class="start-btn">Start Matching</button>
        </a>

        
    </div>

    <script src="js/script.js"></script>
</body>
</html>
